<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="flatpickr.min.css">
  <script src="flatpickr.min.js"></script>
</head>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
  }

  #calendar {
    height: auto;
  }

  .flatpickr-calendar {
    width: 100% !important;
  }
</style>  
<body>

<div style="height: 100%;">
  <div id="calendar"></div>
</div>
<script>
  flatpickr("#calendar", {
    mode: "range",
    dateFormat: "d-m-Y",
    inline: true,
    disableMobile: true,
    clickOpens: false,
    onChange: function(selectedDates) {
      if (selectedDates.length === 2) {
        const start = selectedDates[0].toLocaleDateString('pt-BR');
        const end = selectedDates[1].toLocaleDateString('pt-BR');

        window.AppInventor.setWebViewString(start + "|" + end);
      }
    }
  });
</script>

</body>
</html>
